mode: Mainline
branches:
  main:
    regex: ^main$
    tag: ''
    increment: Patch
    is-mainline: true
  release:
    regex: ^releases?[/-]
    tag: beta
    increment: Patch
    is-release-branch: true
  feature:
    regex: ^feature(s)?[/-]
    tag: alpha
    increment: Inherit
    source-branches: ['main']
ignore:
  sha: []
merge-message-formats: {}
